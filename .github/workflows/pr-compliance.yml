name: PR 품질 검사 (Compliance + Code Quality)

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  # 1. PR 템플릿 양식 검사
  check-template:
    runs-on: ubuntu-latest
    steps:
      - name: 🏷️ 브랜치 네이밍 컨벤션 검사
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          echo "현재 PR 브랜치: $BRANCH_NAME"
          # convention.md 에 명시된 정규식: 타입/이슈번호-기능명 (예: feature/12-login)
          if [[ ! $BRANCH_NAME =~ ^(feature|fix|design|refactor|docs|chore)/[0-9]+-[a-zA-Z0-9_-]+$ ]]; then
            echo "❌ 브랜치 이름 규칙 위반! '타입/이슈번호-기능명' (예: feature/12-kakao-login) 형식을 지켜주세요."
            exit 1
          fi
          echo "✅ 브랜치 규칙 통과!"

      - name: 체크리스트 달성도 검사
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # 체크 안 된 항목('- [ ]')이 하나라도 남아있으면 에러 뱉기
          if echo "$PR_BODY" | grep -q "\- \[ \]"; then
            echo "❌ 체크리스트 중 완료되지 않은 항목이 있습니다! 모두 [x]로 체크해야 Merge할 수 있습니다."
            exit 1
          fi

          # 본문이 너무 짧은지 검사 (최소한의 설명 요구)
          if [ ${#PR_BODY} -lt 30 ]; then
             echo "❌ PR 설명이 너무 짧습니다. 템플릿에 맞게 어떤 작업을 했는지 명확하게 설명해주세요."
             exit 1
          fi
          
          echo "✅ PR 템플릿 검사 통과 성공!"

  # 2. 코드 품질 검증 (린트 → 테스트 → 빌드)
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🟢 Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 의존성 설치
        run: npm ci

      - name: 🔍 코드 린트(ESLint) 검사
        run: npm run lint

      - name: 💬 커밋 메시지 규칙(Commitlint) 검사
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}
        
      - name: 🧪 테스트 실행
        run: npm run test

      - name: 🏗️ 빌드 테스트
        run: npm run build
