# CodeRabbit 설정 파일 (기본 동작 및 프롬프트 튜닝)

language: "ko-KR"
tone_instructions: "모든 출력을 한국어로만 작성. 타협 없는 시니어 리뷰어. 인사말 생략, 핵심만 직답. 최소한의 정밀 수정 제안. TDD와 방어적 코딩 강제. Why+How+코드스니펫 필수."
  
early_access: true

reviews:
  # 모든 PR에 대해 리뷰 봇 작동
  request_reviews: true

  # 피드백 강도와 톤 (기본값보다 훨씬 까다롭고 논리적)
  profile: "assertive"

  # 피드백 상세 수준 (0~100 중 100에 가깝게 하여 디테일 극대화)
  level: 90

  # 리뷰 지침 — 언어 및 리뷰 스타일 강제
  instructions: |
    모든 리뷰 출력(워크스루, 요약, 코멘트, 체크리스트 제목 포함)을 한국어로만 작성하세요. 영어로 작성하지 마세요.
    코드 스니펫 내 변수명/함수명은 원본 그대로 유지하되, 설명은 반드시 한국어로 작성하세요.
    코드를 전면 재작성하지 말고, 변경이 필요한 핵심 코드 라인만 정밀하게 타격하여 최소한으로 수정할 수 있는 피드백을 제공하세요.
    TDD 접근법과 방어적 코딩 원칙을 강제하세요. 에지 케이스, 타입 안전성, 예외 처리가 부족하면 엄격히 지적하세요.
    개선점을 제안할 때는 반드시 '왜(Why)' 고쳐야 하는지 기술적 근거와 '어떻게(How)' 개선할 수 있는지 코드 스니펫을 제시하세요.
    보안 취약점(OWASP), 렌더링 성능 최적화, 메모리 누수 가능성 등 아키텍처 수준의 깊은 통찰을 제공하세요.
  
  # 푸시할 때마다 항상 자동으로 추가(증분) 리뷰를 남기도록 명시적 설정
  auto_review:
    enabled: true
    auto_incremental_review: true
    
  # 리뷰에서 제외할 파일들 (자동 생성 파일 등 제외하여 토큰 낭비 방지)
  ignore:
    - "*.json"
    - "*.md"
    - "package-lock.json"
    - ".husky/*"
    - ".agents/*"
    
chat:
  # PR에서 CodeRabbit을 호출해 질문할 수 있는 기능 활성화
  enabled: true
